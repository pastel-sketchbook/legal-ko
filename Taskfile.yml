version: "3"
env:
  PGM_NAME: legal-ko
  CLI_NAME: legal-ko-cli
tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  fmt:
    desc: Format code
    cmds:
      - cargo fmt --all

  check:
    desc: Type-check without building
    cmds:
      - cargo check --workspace

  clippy:
    desc: Run clippy lints
    cmds:
      - cargo clippy --workspace -- -D warnings

  typos:
    desc: Check for typos in source and docs
    cmds:
      - typos

  check:all:
    desc: Run typos, format check, clippy lints, and tests
    cmds:
      - typos
      - cargo fmt --all --check
      - cargo clippy --workspace -- -D warnings
      - cargo test --workspace

  test:
    desc: Run unit tests
    cmds:
      - cargo test --workspace

  test:core:
    desc: Run core library tests
    cmds:
      - cargo test -p legal-ko-core

  test:tui:
    desc: Run TUI crate tests
    cmds:
      - cargo test -p legal-ko-tui

  build:
    desc: Format and build release binaries
    cmds:
      - cargo fmt --all
      - cargo build --workspace --release

  dev:
    desc: Build debug binaries
    cmds:
      - cargo build --workspace

  run:
    desc: Run the TUI application (release)
    deps: [build]
    cmds:
      - target/release/$PGM_NAME {{.CLI_ARGS}}

  run:cli:
    desc: Run the CLI application (release)
    deps: [build]
    cmds:
      - target/release/$CLI_NAME {{.CLI_ARGS}}

  run:dev:
    desc: Run the TUI application (debug, fast compile)
    deps: [dev]
    cmds:
      - target/debug/$PGM_NAME {{.CLI_ARGS}}

  run:cli:dev:
    desc: Run the CLI application (debug, fast compile)
    deps: [dev]
    cmds:
      - target/debug/$CLI_NAME {{.CLI_ARGS}}

  install:
    desc: Build release and copy binaries to ~/bin
    deps: [build]
    cmds:
      # Remove before copy to force a new inode. macOS caches code
      # signatures by inode; overwriting in-place (same inode) can cause
      # SIGKILL (exit 137) when the binary content changes.
      - rm -f ~/bin/$PGM_NAME ~/bin/$CLI_NAME
      - cp target/release/$PGM_NAME ~/bin
      - cp target/release/$CLI_NAME ~/bin

  rio:
    desc: Launch legal-ko in Rio terminal with D2Coding font
    deps: [install]
    cmds:
      - ./scripts/legal-ko-rio.sh

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean

  changelog:
    desc: Regenerate CHANGELOG.md from git tags and conventional commits
    cmds:
      - ./scripts/changelog.sh > CHANGELOG.md
      - echo "CHANGELOG.md regenerated"

  loc:
    desc: Count lines of code
    cmds:
      - tokei

  loc:files:
    desc: Lines of code per source file
    cmds:
      - tokei crates/ --files

  version:patch:
    desc: Bump patch version (0.0.x)
    vars:
      CURRENT:
        sh: cat VERSION
      MAJOR:
        sh: cat VERSION | cut -d. -f1
      MINOR:
        sh: cat VERSION | cut -d. -f2
      PATCH:
        sh: cat VERSION | cut -d. -f3
    cmds:
      - |
        NEW="{{.MAJOR}}.{{.MINOR}}.$(({{.PATCH}} + 1))"
        echo "$NEW" > VERSION
        sed -i "s/^version = \"{{.CURRENT}}\"/version = \"$NEW\"/" Cargo.toml
        cargo generate-lockfile
        echo "Bumped {{.CURRENT}} → $NEW"

  version:minor:
    desc: Bump minor version (0.x.0)
    vars:
      CURRENT:
        sh: cat VERSION
      MAJOR:
        sh: cat VERSION | cut -d. -f1
      MINOR:
        sh: cat VERSION | cut -d. -f2
    cmds:
      - |
        NEW="{{.MAJOR}}.$(({{.MINOR}} + 1)).0"
        echo "$NEW" > VERSION
        sed -i "s/^version = \"{{.CURRENT}}\"/version = \"$NEW\"/" Cargo.toml
        cargo generate-lockfile
        echo "Bumped {{.CURRENT}} → $NEW"

  version:major:
    desc: Bump major version (x.0.0)
    vars:
      CURRENT:
        sh: cat VERSION
      MAJOR:
        sh: cat VERSION | cut -d. -f1
    cmds:
      - |
        NEW="$(({{.MAJOR}} + 1)).0.0"
        echo "$NEW" > VERSION
        sed -i "s/^version = \"{{.CURRENT}}\"/version = \"$NEW\"/" Cargo.toml
        cargo generate-lockfile
        echo "Bumped {{.CURRENT}} → $NEW"

  version:tag:
    desc: Create git tag from current version
    vars:
      VERSION:
        sh: cat VERSION
    cmds:
      - git tag -a "v{{.VERSION}}" -m "v{{.VERSION}}"
      - echo "Tagged v{{.VERSION}}"

  zmd:sh:
    desc: Run zmd via bash wrapper script
    cmds:
      - ./scripts/zmd-collections.sh {{.CLI_ARGS}}

  # ── zmd collection management ──────────────────────────────

  zmd:
    desc: Run all zmd phases (laws + precedents)
    deps: [install]
    cmds:
      - $CLI_NAME zmd all

  zmd:laws:
    desc: Stage and index law files into zmd
    deps: [install]
    cmds:
      - $CLI_NAME zmd laws

  zmd:precedents:
    desc: Stage and index precedent files into zmd
    deps: [install]
    cmds:
      - $CLI_NAME zmd precedents

  zmd:sync:
    desc: Pull latest repos and re-index zmd
    deps: [install]
    cmds:
      - $CLI_NAME zmd sync

  zmd:status:
    desc: Show zmd collection status
    deps: [install]
    cmds:
      - $CLI_NAME zmd status

  zmd:reset:
    desc: Remove zmd collections and staged data
    deps: [install]
    cmds:
      - $CLI_NAME zmd reset
